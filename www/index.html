    <style>
        /* ============================================
           INDEX.HTML - CSS MINIMALISTA PARA iOS
           Estilos principais estão em style.css
           ============================================ */
        
        /* === VIEW TRANSITIONS (Auth pages) === */
        @view-transition { navigation: auto; }
        ::view-transition-old(auth-logo),
        ::view-transition-new(auth-logo) {
            animation-duration: 0.35s;
            animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        }
        ::view-transition-old(root),
        ::view-transition-new(root) {
            animation: none;
            mix-blend-mode: normal;
        }
        
        /* === APP CONTAINER (Scroll principal) === */
        #app-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            padding: 0;
            z-index: 1;
            box-sizing: border-box;
            /* iOS Scroll nativo */
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            /* Esconder scrollbar */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        #app-container::-webkit-scrollbar { display: none; }
        
        /* === PAGE ROOT === */
        .page-root {
            display: block;
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
        }
        
        /* === CLASSES UTILITÁRIAS === */
        .hidden { display: none !important; }
        .page-loading { opacity: 0; }
        .page-loaded { opacity: 1; transition: opacity 0.2s ease; }

        /* === MODAIS === */
        .modal {
            z-index: 9999;
            position: fixed;
        }
        .modal.is-visible,
        .modal.modal-visible {
            pointer-events: auto;
        }
        
        /* === AUTH MODE (Login/Register) === */
        body.auth-mode .page-root {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
        }
        
        body.auth-mode #bottom-nav-container {
            display: none !important;
        }

        .login-container, .register-container, .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 0 20px;
            margin: 0 auto;
        }

        /* Form inputs com ícones */
        .form-group, .input-group {
            position: relative;
            margin-bottom: 15px;
            width: 100%;
        }

        .form-group i:first-child,
        .input-group i:first-child {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            font-size: 16px;
            color: #888;
            pointer-events: none;
        }

        .form-group input,
        .input-group input {
            padding-left: 45px;
            height: 50px;
            width: 100%;
            box-sizing: border-box;
        }
        
        /* === ESCONDER SCROLLBAR GLOBAL === */
        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        *::-webkit-scrollbar { display: none; }
    </style>
    <script>
        // Esconder menu IMEDIATAMENTE se for página de auth (antes do DOM carregar)
        (function() {
            var path = window.location.pathname;
            var isAuthPage = path.includes('login') || path.includes('cadastro') || path.includes('register') || path.includes('bem-vindo') || path.includes('onboarding');
            if (isAuthPage) {
                document.write('<style>#bottom-nav-container{display:none!important}</style>');
            }
        })();
    </script>
</head>
